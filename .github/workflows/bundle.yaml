name: Bundle

on:
  # Run when a release is published
  release:
    types:
      - published

jobs:
  bundle:
    name: Bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Install Roc
        uses: roc-lang/setup-roc@bd311e2fb815a3d2255f7ee14a922f0b736e020b
        with:
          version: nightly-new-compiler
      - name: Bundle and release the library
        uses: hasnep/bundle-roc-library@v0.1.0
        with:
          library: package/main.roc
          token: ${{ github.token }}
