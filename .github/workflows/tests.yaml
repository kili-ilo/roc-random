on:
  pull_request:
  schedule:
    # Run daily at 8 PM UTC, after the nightlies are typically published.
    - cron: '0 20 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Roc
        uses: roc-lang/setup-roc@bd311e2fb815a3d2255f7ee14a922f0b736e020b
        with:
          version: nightly-new-compiler

      - run: roc version

      - run: ./ci/all_tests.sh
